name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Sync workspace
        run: go work sync
      - name: Test
        run: make test
      - name: Build
        run: make build

  lint:
    strategy:
      fail-fast: false
      matrix:
        module: [shared, plugin, tracker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Build golangci-lint with the runner's Go toolchain (auto-bumped
          # to the version go.work requires) instead of using the prebuilt
          # release binary, which is compiled with an older Go and trips
          # the typecheck linter on files that use newer language features.
          install-mode: goinstall
          working-directory: ${{ matrix.module }}
