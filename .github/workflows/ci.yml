name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Sync workspace
        run: go work sync
      - name: Test
        run: make test
      - name: Build
        run: make build

  lint:
    strategy:
      fail-fast: false
      matrix:
        module: [shared, plugin, tracker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pin to a Go version new enough to typecheck the repo's code.
          # The test jobs install 1.23 and auto-bump via the go.work toolchain
          # directive at build time, but goinstall'd golangci-lint compiles
          # itself against the active Go (its own go.mod doesn't request
          # newer), so the lint job has to install a sufficiently new Go up
          # front. 'stable' tracks the latest released minor.
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Build golangci-lint from source against the runner's Go (above)
          # rather than downloading a prebuilt release binary that ships
          # compiled with an older Go and trips typecheck on newer language
          # features in this repo.
          install-mode: goinstall
          working-directory: ${{ matrix.module }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Sync workspace
        run: go work sync
      - name: Plugin integration tests (real QUIC)
        run: make -C plugin test-integration
