pre-commit:
  commands:
    gofumpt:
      priority: 1
      glob: '**/*.go'
      run: gofumpt -l -w {staged_files}
      stage_fixed: true
    vet:
      priority: 2
      glob: '**/*.go'
      run: go vet ./...
    golangci-lint:
      priority: 2
      glob: '**/*.go'
      run: golangci-lint run --new-from-rev=HEAD
