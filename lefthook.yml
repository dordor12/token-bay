pre-commit:
  commands:
    gofumpt:
      priority: 1
      glob: '**/*.go'
      run: gofumpt -l -w {staged_files}
      stage_fixed: true
    # `go vet ./...` from the workspace root cannot expand ./... because the
    # repo has go.work but no top-level go.mod. Vet per-module instead;
    # only modules whose staged files changed run.
    vet-shared:
      priority: 2
      glob: 'shared/**/*.go'
      run: cd shared && go vet ./...
    vet-plugin:
      priority: 2
      glob: 'plugin/**/*.go'
      run: cd plugin && go vet ./...
    vet-tracker:
      priority: 2
      glob: 'tracker/**/*.go'
      run: cd tracker && go vet ./...
    # golangci-lint can't expand ./... from the workspace root because the
    # repo has go.work but no top-level go.mod. Lint per-module instead;
    # only modules whose staged files changed run.
    golangci-lint-shared:
      priority: 2
      glob: 'shared/**/*.go'
      run: cd shared && golangci-lint run --new-from-rev=HEAD
    golangci-lint-plugin:
      priority: 2
      glob: 'plugin/**/*.go'
      run: cd plugin && golangci-lint run --new-from-rev=HEAD
    golangci-lint-tracker:
      priority: 2
      glob: 'tracker/**/*.go'
      run: cd tracker && golangci-lint run --new-from-rev=HEAD
    # Local integration tests that spawn the real `claude` binary.
    # Run only when relevant paths change. Never executed in CI —
    # GitHub Actions has no claude binary and `make check` doesn't
    # set the build tag.
    plugin-localintegtest:
      priority: 3
      glob:
        - 'plugin/internal/ccbridge/**'
        - 'plugin/test/conformance/**'
        - 'plugin/test/fixtures/**'
      run: make -C plugin localintegtest
