syntax = "proto3";
package tokenbay.federation.v1;

option go_package = "github.com/token-bay/token-bay/shared/federation";

// Kind classifies an Envelope's inner payload. Forward-compat: unknown
// kinds at the receiver MUST be parsed and dropped, not crashed on.
enum Kind {
  KIND_UNSPECIFIED           = 0;
  KIND_HELLO                 = 1;
  KIND_PEER_AUTH             = 2;
  KIND_PEERING_ACCEPT        = 3;
  KIND_PEERING_REJECT        = 4;
  KIND_ROOT_ATTESTATION      = 5;
  KIND_EQUIVOCATION_EVIDENCE = 6;
  KIND_PING                  = 7;
  KIND_PONG                  = 8;
  KIND_TRANSFER_PROOF_REQUEST = 9;
  KIND_TRANSFER_PROOF         = 10;
  KIND_TRANSFER_APPLIED       = 11;
  KIND_REVOCATION             = 12;
  KIND_PEER_EXCHANGE          = 13;
}

// Envelope wraps every steady-state and handshake message (including
// Hello) exchanged between trackers. The receiver verifies sender_sig
// over payload against the peer's Ed25519 public key, which the receiver
// already holds from its operator-managed allowlist (FederationConfig
// peers carry hex-encoded pubkeys; tracker_id is sha256(pubkey)). No
// pubkey is carried on the wire — this prevents trust-on-first-use and
// confines key authority to the operator's allowlist.
message Envelope {
  bytes sender_id  = 1;  // 32 bytes — sender tracker_id (= sha256(pubkey))
  Kind  kind       = 2;
  bytes payload    = 3;  // serialized inner message
  bytes sender_sig = 4;  // 64 bytes — Ed25519(payload) by sender
}

message Hello {
  bytes           tracker_id        = 1;  // 32 bytes
  uint32          protocol_version  = 2;
  bytes           nonce             = 3;  // 32 bytes
  repeated string features          = 4;
}

message PeerAuth {
  bytes nonce_sig = 1;  // 64 bytes — Ed25519(counterparty Hello.nonce)
}

message PeeringAccept {
  uint32 dedupe_ttl_s    = 1;
  uint32 gossip_rate_qps = 2;
}

message PeeringReject { string reason = 1; }

message RootAttestation {
  bytes  tracker_id  = 1;  // 32 bytes
  uint64 hour        = 2;
  bytes  merkle_root = 3;  // exactly storage.PutMerkleRoot's root bytes
  bytes  tracker_sig = 4;  // 64 bytes — exactly storage.PutMerkleRoot's tracker_sig
}

message EquivocationEvidence {
  bytes  tracker_id = 1;  // offender
  uint64 hour       = 2;
  bytes  root_a     = 3;
  bytes  sig_a      = 4;
  bytes  root_b     = 5;
  bytes  sig_b      = 6;
}

message Ping { uint64 nonce = 1; }
message Pong { uint64 nonce = 1; }

message TransferProofRequest {
  bytes  source_tracker_id = 1;
  bytes  dest_tracker_id   = 2;
  bytes  identity_id       = 3;
  uint64 amount            = 4;
  bytes  nonce             = 5;
  bytes  consumer_sig      = 6;
  bytes  consumer_pub      = 7;
  uint64 timestamp         = 8;
}

message TransferProof {
  bytes  source_tracker_id     = 1;
  bytes  dest_tracker_id       = 2;
  bytes  identity_id           = 3;
  uint64 amount                = 4;
  bytes  nonce                 = 5;
  bytes  source_chain_tip_hash = 6;
  uint64 source_seq            = 7;
  uint64 timestamp             = 8;
  bytes  source_tracker_sig    = 9;
}

message TransferApplied {
  bytes  source_tracker_id = 1;
  bytes  dest_tracker_id   = 2;
  bytes  nonce             = 3;
  uint64 timestamp         = 4;
  bytes  dest_tracker_sig  = 5;
}

enum RevocationReason {
  REVOCATION_REASON_UNSPECIFIED = 0;
  REVOCATION_REASON_ABUSE       = 1;  // reputation-driven freeze
  REVOCATION_REASON_MANUAL      = 2;  // operator-issued
  REVOCATION_REASON_EXPIRED     = 3;  // identity TTL elapsed
}

message Revocation {
  bytes            tracker_id  = 1;  // 32 bytes — issuer
  bytes            identity_id = 2;  // 32 bytes — revoked identity
  RevocationReason reason      = 3;
  uint64           revoked_at  = 4;  // unix seconds
  bytes            tracker_sig = 5;  // 64 bytes — Ed25519(canonical) by issuer
}

message KnownPeer {
  bytes  tracker_id   = 1;  // 32 bytes
  string addr         = 2;  // e.g. "wss://tracker.example.org:443"; len ≤ 256
  uint64 last_seen    = 3;  // unix seconds; 0 = never
  string region_hint  = 4;  // human-friendly; len ≤ 64
  double health_score = 5;  // 0..1 (clamped on validate)
}

message PeerExchange {
  repeated KnownPeer peers = 1;  // ≤ 1024 entries (validator)
}
