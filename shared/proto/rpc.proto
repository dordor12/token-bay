syntax = "proto3";
package tokenbay.proto.v1;

option go_package = "github.com/token-bay/token-bay/shared/proto";

// RpcMethod identifies the unary RPC the client is invoking.
//
// Method 0 (RPC_METHOD_UNSPECIFIED) is reserved as the heartbeat-channel
// marker on the dedicated heartbeat stream — it is NOT an "unset" sentinel.
// Validators reject method 0 on regular RPC streams.
enum RpcMethod {
  RPC_METHOD_UNSPECIFIED      = 0;  // heartbeat-channel marker
  RPC_METHOD_ENROLL           = 1;
  RPC_METHOD_BROKER_REQUEST   = 2;
  RPC_METHOD_BALANCE          = 3;
  RPC_METHOD_SETTLE           = 4;
  RPC_METHOD_USAGE_REPORT     = 5;
  RPC_METHOD_ADVERTISE        = 6;
  RPC_METHOD_TRANSFER_REQUEST = 7;
  RPC_METHOD_STUN_ALLOCATE    = 8;
  RPC_METHOD_TURN_RELAY_OPEN  = 9;
  RPC_METHOD_BOOTSTRAP_PEERS  = 10;
}

enum RpcStatus {
  RPC_STATUS_UNSPECIFIED     = 0;
  RPC_STATUS_OK              = 1;
  RPC_STATUS_INVALID         = 2;
  RPC_STATUS_NO_CAPACITY     = 3;
  RPC_STATUS_FROZEN          = 4;
  RPC_STATUS_INTERNAL        = 5;
  RPC_STATUS_UNAUTHENTICATED = 6;
  RPC_STATUS_NOT_FOUND       = 7;
}

message RpcError {
  string code    = 1;
  string message = 2;
}

message RpcRequest {
  RpcMethod method  = 1;
  bytes     payload = 2;
}

message RpcResponse {
  RpcStatus status  = 1;
  bytes     payload = 2;
  RpcError  error   = 3;
}

// --- Per-method payloads ----------------------------------------------

message EnrollRequest {
  bytes  identity_pubkey      = 1;  // 32
  uint32 role                 = 2;  // bit0: consumer, bit1: seeder
  bytes  account_fingerprint  = 3;  // 32 — SHA-256(orgId)
  bytes  nonce                = 4;  // 16
  bytes  consumer_sig         = 5;  // 64
}

message EnrollResponse {
  bytes identity_id           = 1;  // 32
  uint64 starter_grant_credits = 2;
  bytes starter_grant_entry   = 3;  // serialized EntrySigned
}

message SeederAssignment {
  bytes  seeder_addr        = 1;  // utf-8 host:port
  bytes  seeder_pubkey      = 2;  // 32
  bytes  reservation_token  = 3;  // 16 bytes — equals request_id
}

message NoCapacity {
  string reason = 1;
}

message Queued {
  bytes        request_id    = 1;  // 16
  PositionBand position_band = 2;
  EtaBand      eta_band      = 3;
}

message Rejected {
  RejectReason reason        = 1;
  uint32       retry_after_s = 2;
}

message BrokerRequestResponse {
  oneof outcome {
    SeederAssignment seeder_assignment = 1;
    NoCapacity       no_capacity       = 2;
    Queued           queued            = 3;
    Rejected         rejected          = 4;
  }
}

enum PositionBand {
  POSITION_BAND_UNSPECIFIED = 0;
  POSITION_BAND_1_TO_10     = 1;
  POSITION_BAND_11_TO_50    = 2;
  POSITION_BAND_51_TO_200   = 3;
  POSITION_BAND_200_PLUS    = 4;
}

enum EtaBand {
  ETA_BAND_UNSPECIFIED = 0;
  ETA_BAND_LT_30S      = 1;
  ETA_BAND_30S_TO_2M   = 2;
  ETA_BAND_2M_TO_5M    = 3;
  ETA_BAND_5M_PLUS     = 4;
}

enum RejectReason {
  REJECT_REASON_UNSPECIFIED       = 0;
  REJECT_REASON_REGION_OVERLOADED = 1;
  REJECT_REASON_QUEUE_TIMEOUT     = 2;
}

message BalanceRequest {
  bytes identity_id = 1;  // 32
}

message SettleRequest {
  bytes preimage_hash = 1;  // 32
  bytes consumer_sig  = 2;  // 64
}

message SettleAck {}

message UsageReport {
  bytes  request_id     = 1;  // 16 — uuid
  uint32 input_tokens   = 2;
  uint32 output_tokens  = 3;
  string model          = 4;
  bytes  seeder_sig     = 5;  // 64
}

message UsageAck {}

message Advertisement {
  repeated string models     = 1;
  uint32 max_context         = 2;
  bool   available           = 3;
  float  headroom            = 4;
  uint32 tiers               = 5;  // bitmask: bit0 standard, bit1 tee
}

message AdvertiseAck {}

message TransferRequest {
  bytes  identity_id       = 1;  // 32 — consumer identity
  uint64 amount            = 2;
  string dest_region       = 3;  // informational; not part of consumer sig coverage
  bytes  nonce             = 4;  // 32 — also used as ledger TransferRef
  bytes  source_tracker_id = 5;  // 32 — federation tracker_id of the source tracker
  bytes  consumer_sig      = 6;  // 64 — Ed25519(CanonicalTransferProofRequestPreSig) by consumer
  bytes  consumer_pub      = 7;  // 32 — consumer's Ed25519 pubkey
  uint64 timestamp         = 8;  // unix seconds, picked by the consumer at sign time
}

message TransferProof {
  bytes  source_chain_tip_hash = 1;
  uint64 source_seq            = 2;
  bytes  tracker_sig           = 3;
}

message StunAllocateRequest {}
message StunAllocateResponse {
  string external_addr = 1;  // host:port
}

message TurnRelayOpenRequest {
  bytes session_id = 1;  // 16 — uuid
}

message TurnRelayOpenResponse {
  string relay_endpoint = 1;
  bytes  token          = 2;
}

message BootstrapPeersRequest {}

message BootstrapPeer {
  bytes  tracker_id   = 1;  // 32 bytes — SHA-256 of peer tracker's SPKI
  string addr         = 2;  // host:port (UDP for QUIC); len ≤ 256, valid UTF-8
  string region_hint  = 3;  // human-friendly; len ≤ 64, valid UTF-8
  double health_score = 4;  // 0..1; NaN rejected by validator
  uint64 last_seen    = 5;  // unix seconds
}

message BootstrapPeerList {
  bytes  issuer_id  = 1;  // 32 — issuing tracker's IdentityID
  uint64 signed_at  = 2;  // unix seconds
  uint64 expires_at = 3;  // unix seconds
  repeated BootstrapPeer peers = 4;
  bytes  sig        = 5;  // 64 — Ed25519 over CanonicalBootstrapPeerListPreSig(list)
}

// --- Push channel messages --------------------------------------------

message HeartbeatPing {
  uint64 seq = 1;
  uint64 t   = 2;  // unix milliseconds
}

message HeartbeatPong {
  uint64 seq = 1;
}

message OfferPush {
  bytes  consumer_id    = 1;  // 32
  bytes  envelope_hash  = 2;  // 32
  string model          = 3;
  uint32 max_input_tokens  = 4;
  uint32 max_output_tokens = 5;
}

message OfferDecision {
  bool   accept           = 1;
  bytes  ephemeral_pubkey = 2;  // 32, present iff accept
  string reject_reason    = 3;  // present iff !accept
}

message SettlementPush {
  bytes  preimage_hash = 1;  // 32
  bytes  preimage_body = 2;  // serialized EntryBody
}
