run:
  timeout: 5m
  go: '1.23'

linters:
  disable-all: true
  enable:
    - errcheck
    - gofumpt
    - gosec
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
  gosec:
    excludes:
      - G104  # errcheck covers this

issues:
  # Generated protobuf code is exercised end-to-end by round-trip tests
  # in shared/proto and shared/exhaustionproof; lint findings on it would
  # only flag protoc-gen-go output, never our code. Excluding it also
  # removes the inflated .pb.go denominator from the coverage rollup
  # (the wire-format-v1 spec §7.3 ≥90% target is meant for hand-written
  # code, not generated boilerplate).
  exclude-files:
    - '.*\.pb\.go$'
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    # The plugin spawns the `claude` CLI from three places by design:
    # - internal/ccbridge   — seeder-role bridge (claude -p)
    # - internal/ccproxy    — auth-status fingerprint probe (claude auth status)
    # - internal/ratelimit  — /usage TUI probe under PTY (claude /usage)
    # Each takes a configured BinaryPath so callers can stub it in tests; that
    # configurability is what gosec flags as G204. The architectural choice to
    # spawn `claude` is intentional and documented in plugin/CLAUDE.md.
    #
    # Pattern is unanchored so it matches whether golangci-lint is run from
    # repo root (file path: plugin/internal/.../...) or per-module from
    # plugin/ (file path: internal/.../...).
    - path: (^|/)internal/(ccbridge|ccproxy|ratelimit)/.*\.go
      linters:
        - gosec
      text: 'G204'
