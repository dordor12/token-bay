run:
  timeout: 5m
  go: '1.23'

linters:
  disable-all: true
  enable:
    - errcheck
    - gofumpt
    - gosec
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
  gosec:
    excludes:
      - G104  # errcheck covers this

issues:
  # Generated protobuf code is exercised end-to-end by round-trip tests
  # in shared/proto and shared/exhaustionproof; lint findings on it would
  # only flag protoc-gen-go output, never our code. Excluding it also
  # removes the inflated .pb.go denominator from the coverage rollup
  # (the wire-format-v1 spec §7.3 ≥90% target is meant for hand-written
  # code, not generated boilerplate).
  exclude-files:
    - '.*\.pb\.go$'
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    # plugin's ccbridge subprocess module intentionally runs external commands
    - path: plugin/internal/ccbridge/.*\.go
      linters:
        - gosec
      text: 'G204'
